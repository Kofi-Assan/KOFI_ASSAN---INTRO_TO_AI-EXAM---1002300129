# Name: Kofi Assan | Index: 10022300129 | CS4241
# Deploy: New → Blueprint → connect repo → Render loads this file.
# If the build fails on Render due to embeddings/env, run locally:
#   python scripts/download_data.py && python scripts/build_index.py
# then commit artifacts: git add -f data/index data/raw && git commit && git push

services:
  - type: web
    name: ai-10022300129-rag
    runtime: python
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      if [ -f data/index/index.faiss ]; then
        echo "Using prebuilt data/index artifacts from repository."
      else
        echo "No prebuilt index found; attempting on-Render build."
        python scripts/download_data.py
        python scripts/build_index.py
      fi
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.fileWatcherType=none --browser.gatherUsageStats=false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: EMBEDDINGS_BACKEND
        value: local
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: FORCE_BM25_ONLY
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: HF_TOKEN
        sync: false
